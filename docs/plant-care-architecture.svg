  <rect x="30" y="232" width="840" height="200" rx="12" fill="#fffff0" stroke="#f6e05e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="48" y="256" font-size="13" font-weight="700" fill="#975a16">二、服务层 (API Gateway · 微服务)</text>

