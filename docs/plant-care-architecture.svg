  <text x="351" y="389" text-anchor="middle" font-size="12" font-weight="600" fill="#2d3748">设备服务</text>
  <text x="351" y="403" text-anchor="middle" font-size="9" fill="#718096">智能花盆接入 (v2)</text>

  <rect x="456" y="346" width="194" height="64" rx="10" fill="#fff" stroke="#f6e05e" stroke-width="1.5" filter="url(#card-shadow)"/>
