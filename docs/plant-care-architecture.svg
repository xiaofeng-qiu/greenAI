  <text x="162" y="867" text-anchor="middle" font-size="13" font-weight="600" fill="#2d3748">智能花盆 (ESP32)</text>
  <text x="162" y="881" text-anchor="middle" font-size="9" fill="#718096">主控 · WiFi/蓝牙 · OTA</text>

  <!-- Arrow connector -->
  <line x1="272" y1="856" x2="316" y2="856" stroke="#a0aec0" stroke-width="2"/>
  <polygon points="314,850 324,856 314,862" fill="#a0aec0"/>
  <text x="294" y="848" text-anchor="middle" font-size="9" fill="#718096">采集</text>

  <rect x="328" y="820" width="220" height="72" rx="10" fill="#fff" stroke="#feb2b2" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="438" y="847" text-anchor="middle" font-size="22">🌡️</text>
  <text x="438" y="867" text-anchor="middle" font-size="13" font-weight="600" fill="#2d3748">环境传感器组</text>
  <text x="438" y="881" text-anchor="middle" font-size="9" fill="#718096">土壤湿度 · 温湿度 · 光照</text>

  <!-- Arrow connector -->
  <line x1="548" y1="856" x2="592" y2="856" stroke="#a0aec0" stroke-width="2"/>
  <polygon points="590,850 600,856 590,862" fill="#a0aec0"/>
  <text x="570" y="848" text-anchor="middle" font-size="9" fill="#718096">上报</text>

  <rect x="604" y="820" width="244" height="72" rx="10" fill="#fff" stroke="#feb2b2" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="726" y="847" text-anchor="middle" font-size="22">🎯</text>
  <text x="726" y="867" text-anchor="middle" font-size="13" font-weight="600" fill="#2d3748">精准养护建议</text>
  <text x="726" y="881" text-anchor="middle" font-size="9" fill="#718096">实时数据 → 服务层 → 推送主人</text>

  <!-- Footer -->
  <text x="450" y="924" text-anchor="middle" font-size="10" fill="#a0aec0">数据流：用户输入 ↓ 服务编排 ↔ 持久化 ↔ AI 推理 ↻ 设备闭环</text>
</svg>
