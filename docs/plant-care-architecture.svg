  <!-- Arrow L2 -> L3 (3 branches) -->
  <line x1="450" y1="432" x2="450" y2="450" stroke="#a0aec0" stroke-width="2"/>
  <line x1="180" y1="450" x2="720" y2="450" stroke="#a0aec0" stroke-width="2"/>
  <line x1="180" y1="450" x2="180" y2="468" stroke="#a0aec0" stroke-width="2"/>
  <line x1="450" y1="450" x2="450" y2="468" stroke="#a0aec0" stroke-width="2"/>
  <line x1="720" y1="450" x2="720" y2="468" stroke="#a0aec0" stroke-width="2"/>
  <polygon points="174,466 180,476 186,466" fill="#a0aec0"/>
  <polygon points="444,466 450,476 456,466" fill="#a0aec0"/>
  <polygon points="714,466 720,476 726,466" fill="#a0aec0"/>

