  <rect x="52" y="670" width="190" height="60" rx="10" fill="#fff" stroke="#d6bcfa" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="78" y="705" font-size="22">🌱</text>
  <text x="110" y="697" font-size="12" font-weight="600" fill="#2d3748">植物识别 API</text>
  <text x="110" y="713" font-size="9" fill="#718096">百度 / 阿里视觉</text>

  <rect x="252" y="670" width="190" height="60" rx="10" fill="#fff" stroke="#d6bcfa" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="278" y="705" font-size="22">🦠</text>
  <text x="310" y="697" font-size="12" font-weight="600" fill="#2d3748">病害识别 API</text>
  <text x="310" y="713" font-size="9" fill="#718096">EasyDL 自训练</text>

  <rect x="452" y="670" width="190" height="60" rx="10" fill="#fff" stroke="#d6bcfa" stroke-width="1.5" filter="url(#card-shadow)"/>
