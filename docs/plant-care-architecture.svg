<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 940" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4f8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#fff;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-opacity="0.06"/>
    </filter>
    <filter id="card-shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.04"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="940" rx="16" fill="url(#g1)" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#1a202c">系统架构图</text>
  <text x="450" y="62" text-anchor="middle" font-size="12" fill="#718096">智能植物养护平台 — 整体技术架构</text>

  <!-- ============ Layer 1: 用户层 ============ -->
  <rect x="30" y="82" width="840" height="110" rx="12" fill="#ebf8ff" stroke="#90cdf4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="48" y="106" font-size="13" font-weight="700" fill="#2b6cb0">一、用户层 (C 端入口)</text>

  <!-- 4 cards -->
  <rect x="52" y="118" width="190" height="60" rx="10" fill="#fff" stroke="#bee3f8" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="78" y="153" font-size="22">💬</text>
  <text x="110" y="146" font-size="13" font-weight="600" fill="#2d3748">微信小程序</text>
  <text x="110" y="163" font-size="10" fill="#718096">主入口 · 轻量分享</text>

  <rect x="252" y="118" width="190" height="60" rx="10" fill="#fff" stroke="#bee3f8" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="278" y="153" font-size="22">📱</text>
  <text x="310" y="146" font-size="13" font-weight="600" fill="#2d3748">iOS App</text>
  <text x="310" y="163" font-size="10" fill="#718096">原生体验 · 推送通知</text>

  <rect x="452" y="118" width="190" height="60" rx="10" fill="#fff" stroke="#bee3f8" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="478" y="153" font-size="22">🤖</text>
  <text x="510" y="146" font-size="13" font-weight="600" fill="#2d3748">Android App</text>
  <text x="510" y="163" font-size="10" fill="#718096">机型覆盖 · 后台守护</text>

  <rect x="652" y="118" width="196" height="60" rx="10" fill="#fff" stroke="#bee3f8" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="678" y="153" font-size="22">🌐</text>
  <text x="710" y="146" font-size="13" font-weight="600" fill="#2d3748">Web 端</text>
  <text x="710" y="163" font-size="10" fill="#718096">管理后台 · 大屏看板</text>

  <!-- Arrow L1 -> L2 -->
  <line x1="450" y1="192" x2="450" y2="216" stroke="#a0aec0" stroke-width="2"/>
  <polygon points="444,214 450,224 456,214" fill="#a0aec0"/>
  <rect x="370" y="198" width="160" height="18" rx="9" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="450" y="211" text-anchor="middle" font-size="10" fill="#718096">HTTPS · OAuth / JWT</text>

