  <rect x="52" y="270" width="156" height="64" rx="10" fill="#fff" stroke="#f6e05e" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="130" y="294" text-anchor="middle" font-size="20">🔐</text>
  <text x="130" y="313" text-anchor="middle" font-size="12" font-weight="600" fill="#2d3748">认证服务</text>
  <text x="130" y="327" text-anchor="middle" font-size="9" fill="#718096">JWT · 第三方登录</text>

  <rect x="216" y="270" width="156" height="64" rx="10" fill="#fff" stroke="#f6e05e" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="294" y="294" text-anchor="middle" font-size="20">👤</text>
  <text x="294" y="313" text-anchor="middle" font-size="12" font-weight="600" fill="#2d3748">用户服务</text>
  <text x="294" y="327" text-anchor="middle" font-size="9" fill="#718096">资料 · 等级 · 偏好</text>

  <rect x="380" y="270" width="156" height="64" rx="10" fill="#fff" stroke="#f6e05e" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="458" y="294" text-anchor="middle" font-size="20">🌿</text>
  <text x="458" y="313" text-anchor="middle" font-size="12" font-weight="600" fill="#2d3748">植物服务</text>
  <text x="458" y="327" text-anchor="middle" font-size="9" fill="#718096">档案 · 养护计划</text>

  <rect x="544" y="270" width="156" height="64" rx="10" fill="#fff" stroke="#f6e05e" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="622" y="294" text-anchor="middle" font-size="20">⏰</text>
  <text x="622" y="313" text-anchor="middle" font-size="12" font-weight="600" fill="#2d3748">提醒服务</text>
  <text x="622" y="327" text-anchor="middle" font-size="9" fill="#718096">浇水/施肥推送</text>

  <rect x="708" y="270" width="156" height="64" rx="10" fill="#fff" stroke="#f6e05e" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="786" y="294" text-anchor="middle" font-size="20">🩺</text>
  <text x="786" y="313" text-anchor="middle" font-size="12" font-weight="600" fill="#2d3748">诊断服务</text>
  <text x="786" y="327" text-anchor="middle" font-size="9" fill="#718096">病害识别 · 处方</text>

  <!-- Row 2: 4 services -->
  <rect x="52" y="346" width="194" height="64" rx="10" fill="#fff" stroke="#f6e05e" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="149" y="370" text-anchor="middle" font-size="20">🌤️</text>
  <text x="149" y="389" text-anchor="middle" font-size="12" font-weight="600" fill="#2d3748">天气服务</text>
  <text x="149" y="403" text-anchor="middle" font-size="9" fill="#718096">温湿度 · 光照预测</text>

  <rect x="254" y="346" width="194" height="64" rx="10" fill="#fff" stroke="#f6e05e" stroke-width="1.5" filter="url(#card-shadow)"/>
