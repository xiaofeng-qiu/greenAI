  <text x="390" y="546" font-size="13" font-weight="600" fill="#2d3748">Redis</text>
  <text x="390" y="563" font-size="10" fill="#718096">缓存 · 会话 · 提醒队列</text>

  <rect x="596" y="520" width="252" height="60" rx="10" fill="#fff" stroke="#9ae6b4" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="626" y="555" font-size="22">🪣</text>
  <text x="662" y="546" font-size="13" font-weight="600" fill="#2d3748">对象存储</text>
  <text x="662" y="563" font-size="10" fill="#718096">图片 / 语音 / 视频</text>

  <!-- Arrow L3 -> L4 -->
  <line x1="450" y1="594" x2="450" y2="618" stroke="#a0aec0" stroke-width="2"/>
