  <text x="510" y="697" font-size="12" font-weight="600" fill="#2d3748">大模型对话</text>
  <text x="510" y="713" font-size="9" fill="#718096">通义千问 / 文心</text>

  <rect x="652" y="670" width="196" height="60" rx="10" fill="#fff" stroke="#d6bcfa" stroke-width="1.5" filter="url(#card-shadow)"/>
  <text x="678" y="705" font-size="22">📋</text>
  <text x="710" y="697" font-size="12" font-weight="600" fill="#2d3748">养护建议生成</text>
  <text x="710" y="713" font-size="9" fill="#718096">规则引擎 + AI 个性化</text>

  <!-- Arrow L4 -> L5 -->
  <line x1="450" y1="744" x2="450" y2="768" stroke="#a0aec0" stroke-width="2" stroke-dasharray="4 3"/>
  <polygon points="444,766 450,776 456,766" fill="#a0aec0"/>
  <rect x="358" y="750" width="184" height="18" rx="9" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="450" y="763" text-anchor="middle" font-size="10" fill="#718096">v2.0+ · 数据回流模型迭代</text>

  <!-- ============ Layer 5: 硬件层 ============ -->
  <rect x="30" y="784" width="840" height="120" rx="12" fill="#fff5f5" stroke="#feb2b2" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="48" y="808" font-size="13" font-weight="700" fill="#9b2c2c">五、硬件层 (IoT · v2.0+)</text>

  <rect x="52" y="820" width="220" height="72" rx="10" fill="#fff" stroke="#feb2b2" stroke-width="1.5" filter="url(#card-shadow)"/>
