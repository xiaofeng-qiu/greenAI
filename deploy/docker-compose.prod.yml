# Production-style stack: API + PostgreSQL. Use from repo root with env file.
# See docs/engineering/deployment.md
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: greenai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: greenai
    volumes:
      - greenai_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U greenai -d greenai"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ../.env
    ports:
      - "${API_PUBLISH_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  greenai_pg_data: {}
